name: CI

# Runs on every push to dev/main + every PR targeting them.
# Catches build-breakers that would otherwise only surface on Vercel
# (e.g. the unregistered `/admin/sharing` route that deployed as a
# blank page until we noticed). Each job is independent so a failing
# lint doesn't mask a failing typecheck.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main, staging]

# Cancel in-progress runs when a newer commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      # Soft-fail until the codebase is lint-clean; flip to required
      # once outstanding warnings are addressed.
      - run: npm run lint || true

  test:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm test

  build:
    name: Vite build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      # Catches missing route registrations, malformed CSS, missing
      # files — the exact class of bug that snuck through this week.
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://vtarjrnqvcqbhoclvcur.supabase.co
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY || 'placeholder' }}

  guard-typeof-import:
    name: Guard `typeof import(...)`
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # Pure node script — no install needed. Cheap.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/check-no-typeof-import.mjs

  guard-tdz-forward-refs:
    name: Guard TDZ forward-refs
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # Catches the production TDZ class that broke /admin/catalogs.
    # Strict mode fails on warnings too — codebase is currently clean
    # and we want to keep it that way.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/check-tdz-forward-refs.mjs --strict

  guard-routes:
    name: Guard admin route coverage
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # Pure node — no install. Asserts every /admin/* nav + search target in
    # route.tsx has a registered route() in vite.config.ts. Cheap static check
    # that catches the 404/blank-page class (e.g. /admin/daily-feed) before the
    # browser smoke job even has to.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/check-routes.mjs

  smoke:
    name: Smoke (admin routes)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # Catches the TDZ class of bug that broke /admin/data + /admin/catalogs
    # in prod. Builds the app, serves the dist with `vite preview`, then
    # loads each critical route in a real browser and fails if any of
    # them render the ErrorBoundary or throw uncaught.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm run test:smoke
        env:
          VITE_SUPABASE_URL: https://vtarjrnqvcqbhoclvcur.supabase.co
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY || 'placeholder' }}
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: test-results/
