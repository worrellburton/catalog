name: Deploy Modal

on:
  push:
    branches: [main]
    paths:
      - 'agents/video-generator/**'
      - 'agents/site-crawler/**'
      - 'agents/product-scraper/**'
      - '.github/workflows/deploy-modal.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Modal
        run: pip install modal

      - name: Deploy video-generator
        working-directory: agents/video-generator
        run: modal deploy modal_app.py

      - name: Deploy site-crawler
        working-directory: agents/site-crawler
        run: modal deploy modal_app.py

      - name: Deploy product-scraper
        working-directory: agents/product-scraper
        run: modal deploy modal_app.py
