name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - dev
      - staging

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Detect whether this push actually touched any migration / function files.
  # If not, the migrate job is a no-op and deploy can proceed without it —
  # otherwise a transient migrate failure (missing secret, network blip)
  # blocks every UI-only deploy too, which is what was happening up until
  # this commit.
  changes:
    name: Detect Supabase changes
    runs-on: ubuntu-latest
    outputs:
      supabase: ${{ steps.filter.outputs.supabase }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            supabase:
              - 'supabase/migrations/**'
              - 'supabase/functions/**'

  migrate:
    name: Run Supabase Migrations
    needs: changes
    if: needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy:
    name: Deploy to GitHub Pages
    # Run after migrate, but proceed whether migrate ran or was skipped —
    # the only thing that should block deploy is migrate actually failing.
    needs: [changes, migrate]
    if: always() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          VITE_MODAL_CRAWLER_URL: ${{ secrets.VITE_MODAL_CRAWLER_URL }}
          VITE_MODAL_SCRAPER_URL: ${{ secrets.VITE_MODAL_SCRAPER_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
