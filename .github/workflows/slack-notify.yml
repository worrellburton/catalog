name: Slack push notify

# Fires on every push to any branch. To limit to your long-lived branches,
# replace `push:` with:  push: { branches: [dev, staging, main] }
on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post push to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          PUSHER: ${{ github.event.pusher.name }}
          COMPARE: ${{ github.event.compare }}
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
        run: |
          # Skip when the secret isn't available (e.g. fork pushes) so we don't POST to an empty URL.
          if [ -z "$SLACK_WEBHOOK_URL" ]; then echo "No webhook secret; skipping."; exit 0; fi

          # One bullet per commit: short SHA (linked) + first line of the message + author.
          # ponytail: first line only — commit bodies are omitted to keep the Slack post readable.
          lines=$(printf '%s' "$COMMITS_JSON" \
            | jq -r '.[] | "• <\(.url)|\(.id[0:7])> \(.message | split("\n")[0]) — \(.author.name)"')

          # Branch create/delete and tag pushes carry no commits — nothing to announce.
          if [ -z "$lines" ]; then echo "No commits in payload; skipping."; exit 0; fi

          text=$(printf '*🚀 %s* pushed to *%s@%s*\n%s\n<%s|View changes>' \
            "$PUSHER" "$REPO" "$BRANCH" "$lines" "$COMPARE")

          jq -n --arg t "$text" '{text:$t}' \
            | curl -sS -X POST -H 'Content-type: application/json' --data @- "$SLACK_WEBHOOK_URL"
