  <!-- Bottom bar -->
  <div class="bottom-bar" id="bottom-bar">
    <div class="bottom-bar-inner">
      <button class="filter-chip" data-filter="women">Women</button>
      <button class="filter-chip" data-filter="men">Men</button>
      <div class="bottom-divider"></div>
      <button class="search-btn" id="search-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>

  <!-- Search overlay (mobile) -->
  <div class="search-overlay" id="search-overlay">
    <button class="search-overlay-close" id="search-overlay-close">&times;</button>
    <p class="search-overlay-tagline">Discover looks.<br>Build your catalog.</p>
    <div class="search-overlay-input-wrap">
      <input type="text" class="search-overlay-input" id="search-overlay-input" placeholder="Search anything...">
    </div>
  </div>

  <!-- Look Detail Overlay -->
  <div id="look-overlay" class="hidden">
    <button id="close-look" aria-label="Close">&times;</button>
    <div class="look-detail">
      <div class="look-media">
        <div class="look-placeholder" id="detail-media"></div>
      </div>
      <div class="look-info" id="detail-info">
        <div class="detail-creator" id="detail-creator"></div>
        <h2 id="detail-title"></h2>
        <p id="detail-description"></p>
        <div id="detail-products"></div>
      </div>
    </div>
  </div>
