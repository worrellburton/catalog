<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#1a1320"/>
      <stop offset="55%" stop-color="#0e0e12"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="glow1" cx="75%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#3c4870" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3c4870" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="85%" r="35%">
      <stop offset="0%" stop-color="#7a5070" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7a5070" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e1f5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- mini look-grid hint, top right -->
  <g opacity="0.55" transform="translate(820,80)">
    <rect x="0"   y="0"   width="80" height="120" rx="10" fill="#2a2530"/>
    <rect x="92"  y="0"   width="80" height="120" rx="10" fill="#1f2a3a"/>
    <rect x="184" y="0"   width="80" height="120" rx="10" fill="#2d2435"/>
    <rect x="0"   y="132" width="80" height="120" rx="10" fill="#1d2735"/>
    <rect x="92"  y="132" width="80" height="120" rx="10" fill="#2a2a36"/>
    <rect x="184" y="132" width="80" height="120" rx="10" fill="#1c1f2d"/>
  </g>

  <text x="80" y="345"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="148" font-weight="700" fill="url(#title)" letter-spacing="-4">
    catalog
  </text>

  <text x="80" y="420"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="400" fill="#b8b0c8">
    A creator-powered shopping platform.
  </text>
  <text x="80" y="466"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="400" fill="#b8b0c8">
    Discover products through curated looks.
  </text>

  <text x="80" y="555"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="24" font-weight="600" fill="#7d7497" letter-spacing="2">
    CATALOG.SHOP
  </text>
</svg>
